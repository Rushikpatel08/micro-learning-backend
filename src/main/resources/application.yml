spring:
  application:
    name: micro-learning-api

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  datasource:
    url: jdbc:h2:mem:microlearning;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 3000


jwt:
  secret: 9f3c8b6a1d4e7f2c9a8b6d4e1f7c3a9b8d6f1e2c4a7b9d5e8f3c1a6b9d2e7f5
  expiration: 604800000  # 7 days in milliseconds

cors:
  allowed-origins: http://localhost:5173

