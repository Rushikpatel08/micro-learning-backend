<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Documentation</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #0f172a;
      --panel-2: #111c2f;
      --border: #243244;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 18px 45px rgba(2, 8, 23, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top left, #14233d 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .hero {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      backdrop-filter: blur(12px);
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      max-width: 720px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 260px;
      padding: 14px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      font-size: 0.96rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
    }

    .chip {
      color: var(--muted);
      font-size: 0.95rem;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .status {
      margin-bottom: 18px;
      color: var(--muted);
      min-height: 24px;
    }

    .controller-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .controller-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }

    .controller-toggle:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .controller-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .controller-name {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .controller-desc {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toggle-icon {
      font-size: 1.15rem;
      color: var(--accent);
      transition: transform 0.2s ease;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .controller-toggle[aria-expanded="false"] .toggle-icon {
      transform: rotate(-90deg);
    }

    .controller-panel {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
    }

    .controller-panel.is-open {
      display: block;
    }

    .endpoint-list {
      display: grid;
      gap: 12px;
    }

    .endpoint-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .endpoint-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #fff;
    }

    .badge.get { background: linear-gradient(135deg, #0ea5e9, #38bdf8); }
    .badge.post { background: linear-gradient(135deg, #10b981, #22c55e); }
    .badge.put { background: linear-gradient(135deg, #f59e0b, #fb923c); }
    .badge.delete { background: linear-gradient(135deg, #ef4444, #f87171); }
    .badge.default { background: linear-gradient(135deg, #64748b, #94a3b8); }

    .endpoint-path {
      font-family: Consolas, "Courier New", monospace;
      color: #f8fafc;
      font-size: 0.96rem;
    }

    .endpoint-summary {
      margin: 0 0 12px;
      color: #cbd5e1;
      font-size: 0.96rem;
    }

    .meta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .meta-pill {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.85rem;
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .meta-pill strong {
      color: var(--accent);
      font-weight: 600;
    }

    .param-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .param-pill {
      border: 1px solid rgba(129, 140, 248, 0.24);
      background: rgba(129, 140, 248, 0.14);
      color: #dbeafe;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.84rem;
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .param-pill .required {
      color: #fef08a;
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: 28px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      color: var(--muted);
    }

    @media (max-width: 680px) {
      .app { padding: 20px 14px 48px; }
      .hero { padding: 20px; }
      .controller-toggle { padding: 16px; }
      .endpoint-card { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>API Documentation</h1>
      <p>Browse controllers, endpoints, parameters, and return types from the backend metadata feed.</p>
    </header>

    <div class="toolbar">
      <input id="searchInput" class="search-box" type="text" placeholder="Search controllers, paths, summaries, or params..." />
      <span id="resultCount" class="chip">Loading APIs...</span>
    </div>

    <div id="status" class="status">Fetching metadata from /apis...</div>
    <div id="docs"></div>
  </div>

  <script>
    const docsEl = document.getElementById('docs');
    const statusEl = document.getElementById('status');
    const searchInput = document.getElementById('searchInput');
    const resultCountEl = document.getElementById('resultCount');

    const state = {
      data: [],
      query: ''
    };

    searchInput.addEventListener('input', (event) => {
      state.query = event.target.value.trim().toLowerCase();
      render();
    });

    async function loadApis() {
      try {
        const baseUrl = window.location.origin + '/api/v1';
        const apiUrl = `${baseUrl}/monitoring/apis`;
        statusEl.textContent = `Fetching metadata from ${apiUrl}...`;
        const response = await fetch(apiUrl, { credentials: 'include' });
        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const payload = await response.json();
        state.data = Array.isArray(payload) ? payload : [];
        render();
        statusEl.textContent = `Loaded ${state.data.length} controller${state.data.length === 1 ? '' : 's'}.`;
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Unable to load API metadata. Ensure the backend exposes /api/v1/monitoring/apis.';
        docsEl.innerHTML = '<div class="empty-state">Unable to load documentation. Please verify the backend endpoint.</div>';
      }
    }

    function render() {
      const normalizedData = normalizePayload(state.data);
      const filtered = filterControllers(normalizedData, state.query);
      resultCountEl.textContent = filtered.length === 0
        ? 'No matches'
        : `${filtered.length} controller${filtered.length === 1 ? '' : 's'}`;

      if (!filtered.length) {
        docsEl.innerHTML = '<div class="empty-state">No controllers match your search.</div>';
        return;
      }

      docsEl.innerHTML = filtered.map((controller) => {
        const endpoints = controller.endpoints || [];
        const visibleEndpoints = endpoints.filter((endpoint) => matchesQuery(endpoint, state.query));

        return `
          <section class="controller-card">
            <button class="controller-toggle" type="button" aria-expanded="true">
              <span class="controller-title-wrap">
                <span class="controller-name">${escapeHtml(controller.controller || 'Unnamed Controller')}</span>
                <span class="controller-desc">${escapeHtml(controller.description || 'No description available')}</span>
              </span>
              <span class="toggle-icon">▾</span>
            </button>
            <div class="controller-panel is-open">
              <div class="endpoint-list">
                ${visibleEndpoints.length ? visibleEndpoints.map((endpoint) => `
                  <article class="endpoint-card">
                    <div class="endpoint-head">
                      <span class="badge ${getMethodClass(endpoint.httpMethod)}">${escapeHtml(endpoint.httpMethod || 'GET')}</span>
                      <span class="endpoint-path">${escapeHtml(endpoint.path || '/')}</span>
                    </div>
                    <p class="endpoint-summary">${escapeHtml(endpoint.summary || 'No summary provided')}</p>
                    ${renderParams(endpoint.params || [])}
                    <div class="meta-row">
                      <span class="meta-pill"><strong>Returns</strong> ${escapeHtml(endpoint.returnType || 'unknown')}</span>
                    </div>
                  </article>
                `).join('') : '<div class="empty-state">No endpoints match this search.</div>'}
              </div>
            </div>
          </section>
        `;
      }).join('');

      bindToggleEvents();
    }

    function bindToggleEvents() {
      document.querySelectorAll('.controller-toggle').forEach((button) => {
        button.addEventListener('click', () => {
          const panel = button.nextElementSibling;
          const expanded = button.getAttribute('aria-expanded') === 'true';
          button.setAttribute('aria-expanded', String(!expanded));
          panel.classList.toggle('is-open', !expanded);
        });
      });
    }

    function normalizePayload(payload) {
      if (!Array.isArray(payload)) {
        return [];
      }

      return payload.map((item) => {
        if (item && Array.isArray(item.endpoints)) {
          return item;
        }

        return {
          controller: item.controller || 'Unnamed Controller',
          description: item.description || 'No description available',
          endpoints: [
            {
              httpMethod: item.httpMethod || 'GET',
              path: item.endpoint || item.path || '/',
              summary: item.summary || 'No summary provided',
              params: Array.isArray(item.params) ? item.params : [],
              returnType: item.returnType || item.javaMethod || 'unknown'
            }
          ]
        };
      });
    }

    function filterControllers(controllers, query) {
      const normalized = query.trim().toLowerCase();
      if (!normalized) {
        return controllers;
      }

      return controllers.filter((controller) => {
        const controllerText = [
          controller.controller,
          controller.description,
          ...(controller.endpoints || []).map((endpoint) => [
            endpoint.httpMethod,
            endpoint.path,
            endpoint.summary,
            endpoint.returnType,
            ...(endpoint.params || []).map((param) => `${param.name} ${param.type} ${param.required ? 'required' : 'optional'}`)
          ].join(' '))
        ].join(' ').toLowerCase();

        return controllerText.includes(normalized);
      });
    }

    function matchesQuery(endpoint, query) {
      if (!query) {
        return true;
      }

      const searchable = [
        endpoint.httpMethod,
        endpoint.path,
        endpoint.summary,
        endpoint.returnType,
        ...(endpoint.params || []).map((param) => `${param.name} ${param.type} ${param.required ? 'required' : 'optional'}`)
      ].join(' ').toLowerCase();

      return searchable.includes(query);
    }

    function renderParams(params) {
      if (!params.length) {
        return '';
      }

      return `
        <div class="param-list">
          ${params.map((param) => `
            <span class="param-pill">
              <strong>${escapeHtml(param.name || 'param')}</strong>
              <span>${escapeHtml(param.type || 'unknown')}</span>
              <span class="required">${param.required ? 'required' : 'optional'}</span>
            </span>
          `).join('')}
        </div>
      `;
    }

    function getMethodClass(httpMethod) {
      switch ((httpMethod || 'GET').toUpperCase()) {
        case 'GET': return 'get';
        case 'POST': return 'post';
        case 'PUT': return 'put';
        case 'DELETE': return 'delete';
        default: return 'default';
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    loadApis();
  </script>
</body>
</html>
